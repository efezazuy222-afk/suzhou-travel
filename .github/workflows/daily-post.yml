name: 每日自动发布

on:
  schedule:
    - cron: '0 2 * * *'
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install openai requests
      - run: python generate.py
        env:
          DEEPSEEK_KEY: ${{ secrets.sk-e411674adab84202adea93c8e918b475 }}
          UNSPLASH_KEY: ${{ secrets.zbHgRBgMWl4Vgm6td0HMA8o8guj5PK-eSIWVu9YGT_s }}