name: 每日自动发布

on:
  schedule:
    - cron: '0 2 * * *'
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install openai requests
      - run: python generate.py
        env:
          DEEPSEEK_KEY: ${{ secrets.DEEPSEEK_KEY }}
          UNSPLASH_KEY: ${{ secrets.UNSPLASH_KEY }}

      # 新增：触发 Cloudflare 重新部署
      - name: 触发 Cloudflare 部署
        run: curl -X POST "https://api.cloudflare.com/client/v4/pages/webhooks/deploy_hooks/464be281-a3dc-4fe5-bba5-517a03e63970"